name: e2e

on:
  push:
    branches: ["**"]
    paths:
      - "packages/ethds-react/**"
      - "packages/ethds-tokens/**"
      - "packages/ethds-e2e/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    paths:
      - "packages/ethds-react/**"
      - "packages/ethds-tokens/**"
      - "packages/ethds-e2e/**"
      - ".github/workflows/e2e.yml"

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Build tokens (dependency)
        run: npm run build -w @ethds/tokens
      - name: Build react (dependency)
        run: npm run build -w @ethds/react
      # GitHub-hosted runners have no browsers preinstalled (unlike local
      # dev environments that may ship a pinned Chromium) — install the
      # exact Chromium build pinned in packages/ethds-e2e/package.json.
      - name: Typecheck
        run: npm run typecheck -w @ethds/e2e
      - name: Install Playwright's Chromium
        working-directory: packages/ethds-e2e
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: packages/ethds-e2e
        run: npm test
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/ethds-e2e/playwright-report/
          retention-days: 14
